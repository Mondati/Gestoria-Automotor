  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f4e3;
      --accent: #cdb28a;
      --accent-dark: #b89567;
      --bg2: #d4ddb1;
      --support: #b1ba8e;
      --title: #7a6448;
      --title-dark: #5c4a33;
      --text: #6b5d45;
      --text-light: #9a8870;
      --white: #fff;
      --card-bg: rgba(255,255,255,0.65);
      --shadow: 0 2px 16px rgba(122,100,72,0.06);
      --shadow-hover: 0 10px 36px rgba(122,100,72,0.12);
      --radius: 16px;
      --display-font: 'DM Serif Display', serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* Animate in — opacity:0 added by JS only to off-screen elements */
    .fade-up {
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .fade-up.will-animate {
      opacity: 0;
      transform: translateY(24px);
    }
    .fade-up.will-animate.visible {
      opacity: 1;
      transform: none;
    }
    .fade-up-delay-1 { transition-delay: 0.1s; }
    .fade-up-delay-2 { transition-delay: 0.2s; }
    .fade-up-delay-3 { transition-delay: 0.3s; }
    .fade-up-delay-4 { transition-delay: 0.4s; }

    /* Decorative divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
    }
    .section-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(205,178,138,0.35));
    }
    .section-divider-line.left {
      background: linear-gradient(to left, transparent, rgba(205,178,138,0.35));
    }
    .section-divider-diamond {
      width: 6px; height: 6px;
      background: var(--accent);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 5vw;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(249,244,227,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(205,178,138,0.15);
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 20px rgba(122,100,72,0.08); }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 13.5px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s;
      transform-origin: left;
    }
    .nav-links a:hover { color: var(--title); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .nav-cta {
      background: var(--title) !important;
      color: var(--white) !important;
      padding: 8px 18px !important;
      border-radius: 50px !important;
      font-size: 12.5px !important;
      font-weight: 600 !important;
      letter-spacing: 0.01em !important;
      transition: background 0.2s, transform 0.15s !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover {
      background: var(--title-dark) !important;
      transform: translateY(-1px) !important;
      color: var(--white) !important;
    }

    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-burger span {
      display: block;
      width: 22px; height: 1.5px;
      background: var(--title);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 68px; left: 0; right: 0;
      background: rgba(249,244,227,0.97);
      backdrop-filter: blur(24px);
      z-index: 99;
      padding: 24px 5vw 32px;
      border-bottom: 1px solid rgba(205,178,138,0.18);
      flex-direction: column;
      gap: 4px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      padding: 12px 0;
      border-bottom: 1px solid rgba(205,178,138,0.12);
    }
    .mobile-menu a:last-child { border-bottom: none; }

    /* BUTTONS */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--title);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-primary:hover {
      background: var(--title-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(122,100,72,0.2);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      color: var(--title);
      padding: 9px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      border: 1.5px solid rgba(205,178,138,0.65);
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: rgba(205,178,138,0.1);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 68px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .hero-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-orb-1 {
      top: -80px; right: -120px;
      width: 560px; height: 560px;
      background: radial-gradient(ellipse, rgba(212,221,177,0.5) 0%, transparent 68%);
    }
    .hero-orb-2 {
      bottom: -100px; left: -160px;
      width: 440px; height: 360px;
      background: radial-gradient(ellipse, rgba(205,178,138,0.16) 0%, transparent 68%);
    }
    .hero-orb-3 {
      top: 40%; left: 40%;
      width: 300px; height: 300px;
      background: radial-gradient(ellipse, rgba(205,178,138,0.07) 0%, transparent 70%);
    }

    /* Decorative corner lines */
    .hero-corner {
      position: absolute;
      bottom: 40px; right: 40px;
      width: 80px; height: 80px;
      border-right: 1px solid rgba(205,178,138,0.3);
      border-bottom: 1px solid rgba(205,178,138,0.3);
      pointer-events: none;
    }
    .hero-corner-tl {
      position: absolute;
      top: 88px; left: 40px;
      width: 60px; height: 60px;
      border-left: 1px solid rgba(205,178,138,0.2);
      border-top: 1px solid rgba(205,178,138,0.2);
      pointer-events: none;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      padding: 80px 5vw;
      max-width: 1120px;
      margin: 0 auto;
      width: 100%;
      position: relative;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(205,178,138,0.12);
      border: 1px solid rgba(205,178,138,0.3);
      border-radius: 50px;
      padding: 5px 14px 5px 10px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--title);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero-eyebrow-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    .hero-title {
      font-family: var(--display-font);
      font-size: clamp(34px, 4.5vw, 54px);
      font-weight: 400;
      color: var(--title);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent-dark);
    }

    .hero-subtitle {
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--text);
      font-weight: 400;
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .hero-support {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.75;
      margin-bottom: 36px;
      max-width: 420px;
    }
    .hero-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Hero visual */
    .hero-visual { display: flex; justify-content: center; }
    .hero-car-card {
      width: 100%;
      max-width: 460px;
      aspect-ratio: 4/3;
      background: linear-gradient(140deg, rgba(212,221,177,0.45) 0%, rgba(205,178,138,0.18) 100%);
      border-radius: 28px;
      border: 1px solid rgba(205,178,138,0.28);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-hover);
    }
    /* Inner decorative frame */
    .hero-car-card::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(205,178,138,0.15);
      border-radius: 20px;
      pointer-events: none;
    }
    .hero-car-svg { width: 74%; opacity: 0.82; }

    .hero-badge {
      position: absolute;
      bottom: 20px; left: 20px;
      background: rgba(249,244,227,0.94);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(205,178,138,0.28);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-badge-icon {
      width: 32px; height: 32px;
      background: rgba(212,221,177,0.5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-badge-text strong { display: block; font-size: 12px; font-weight: 700; color: var(--title); }
    .hero-badge-text span { font-size: 11px; color: var(--text-light); }

    .hero-badge2 {
      position: absolute;
      top: 20px; right: 20px;
      background: var(--title);
      border-radius: 10px;
      padding: 9px 13px;
    }
    .hero-badge2 strong { display: block; font-size: 11px; font-weight: 700; color: var(--white); letter-spacing: 0.04em; }
    .hero-badge2 span { font-size: 10px; color: rgba(255,255,255,0.6); }

    /* SECTION LAYOUT */
    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-dark);
      margin-bottom: 10px;
    }
    .section-title {
      font-family: var(--display-font);
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 400;
      color: var(--title);
      line-height: 1.15;
    }
    .section-text {
      font-size: 15.5px;
      color: var(--text-light);
      line-height: 1.8;
    }

    /* TRUST */
    .trust-section { background: var(--bg); padding: 100px 5vw; }
    .trust-inner { max-width: 1120px; margin: 0 auto; }
    .trust-header { text-align: center; margin-bottom: 56px; }
    .trust-header .section-text { margin: 16px auto 0; max-width: 520px; }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .trust-card {
      background: var(--card-bg);
      border: 1px solid rgba(205,178,138,0.18);
      border-radius: var(--radius);
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.25s, transform 0.25s;
      backdrop-filter: blur(8px);
    }
    .trust-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
    .trust-icon {
      width: 44px; height: 44px;
      background: rgba(212,221,177,0.45);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
    }
    .trust-icon svg { width: 22px; height: 22px; stroke: var(--title); }
    .trust-card h3 { font-size: 15px; font-weight: 700; color: var(--title); line-height: 1.3; }
    .trust-card p { font-size: 13.5px; color: var(--text-light); line-height: 1.65; }

    .trust-banner {
      background: linear-gradient(100deg, rgba(212,221,177,0.3), rgba(205,178,138,0.15));
      border: 1px solid rgba(177,186,142,0.3);
      border-radius: var(--radius);
      padding: 26px 36px;
      text-align: center;
    }
    .trust-banner p { font-size: 15px; color: var(--title); font-style: italic; line-height: 1.75; }

    /* SERVICES */
    .services-section { background: #f2edd9; padding: 100px 5vw; }
    .services-inner { max-width: 1120px; margin: 0 auto; }
    .services-header { margin-bottom: 52px; }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .service-card {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(205,178,138,0.18);
      border-radius: var(--radius);
      padding: 24px 22px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.22s, transform 0.22s;
      backdrop-filter: blur(6px);
    }
    .service-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .service-num {
      width: 36px; height: 36px;
      background: rgba(205,178,138,0.18);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--accent-dark);
      flex-shrink: 0;
    }
    .service-card h3 { font-size: 14px; font-weight: 700; color: var(--title); line-height: 1.4; margin-bottom: 3px; }
    .service-card p { font-size: 12.5px; color: var(--text-light); line-height: 1.6; }

    /* ADVISORY */
    .advisory-section { background: var(--title); padding: 100px 5vw; position: relative; overflow: hidden; }
    .advisory-orb {
      position: absolute; top: -80px; right: -80px;
      width: 350px; height: 350px;
      background: radial-gradient(ellipse, rgba(205,178,138,0.1) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .advisory-orb2 {
      position: absolute; bottom: -60px; left: -60px;
      width: 250px; height: 250px;
      background: radial-gradient(ellipse, rgba(212,221,177,0.06) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .advisory-inner {
      max-width: 1120px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center; position: relative;
    }
    .advisory-inner .section-label { color: rgba(205,178,138,0.75); }
    .advisory-inner .section-title { color: var(--white); margin-bottom: 16px; }
    .advisory-text { font-size: 16px; color: rgba(255,255,255,0.68); line-height: 1.8; }
    .advisory-badge-free {
      margin-top: 32px;
      display: inline-flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(205,178,138,0.28);
      border-radius: 12px; padding: 14px 22px;
    }
    .advisory-badge-free span { font-size: 15px; font-weight: 600; color: var(--white); }

    .advisory-cards { display: flex; flex-direction: column; gap: 14px; }
    .advisory-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(205,178,138,0.18);
      border-radius: var(--radius);
      padding: 22px 26px;
      display: flex; align-items: center; gap: 18px;
      transition: background 0.2s;
    }
    .advisory-card:hover { background: rgba(255,255,255,0.09); }
    .advisory-card-icon {
      width: 44px; height: 44px;
      background: rgba(205,178,138,0.16);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .advisory-card-icon svg { width: 20px; height: 20px; stroke: var(--accent); }
    .advisory-card h4 { font-size: 14.5px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .advisory-card p { font-size: 13px; color: rgba(255,255,255,0.52); line-height: 1.55; }

    /* COVERAGE */
    .coverage-section { background: var(--bg2); padding: 100px 5vw; }
    .coverage-inner {
      max-width: 1120px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center;
    }
    .coverage-inner .section-text { margin-top: 18px; }

    .coverage-map {
      background: rgba(249,244,227,0.55);
      border: 1px solid rgba(177,186,142,0.38);
      border-radius: 24px;
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      position: relative; overflow: hidden;
    }
    .coverage-map::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(205,178,138,0.12) 0%, transparent 70%);
    }
    .coverage-map p { font-size: 11px; font-weight: 700; color: var(--title); letter-spacing: 0.1em; text-transform: uppercase; }

    .coverage-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 36px; }
    .coverage-stat {
      background: rgba(249,244,227,0.55);
      border: 1px solid rgba(177,186,142,0.28);
      border-radius: 12px; padding: 18px;
      backdrop-filter: blur(6px);
    }

function useScrollReveal() {
  useEffect(() => {
    let io;
    const init = () => {
      const els = document.querySelectorAll('.fade-up');
      io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
      els.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) {
          // In viewport — leave visible, no animation class
        } else {
          el.classList.add('will-animate');
          io.observe(el);
        }
      });
    };
    const t = setTimeout(init, 100);
    return () => { clearTimeout(t); io && io.disconnect(); };
  }, []);
}

function WAFloat() {
  const [showTip, setShowTip] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => { setShowTip(true); }, 2500);
    const t2 = setTimeout(() => { setShowTip(false); }, 6000);
    return () => { clearTimeout(t); clearTimeout(t2); };
  }, []);
  return (
    <div className="wa-float">
      {showTip && <div className="wa-tooltip">¡Consultá ahora!</div>}
      <a href={WA_MAIN} target="_blank" rel="noreferrer" className="wa-btn" aria-label="WhatsApp">
        <WASvg />
      </a>
    </div>
  );
}

// ── TWEAKS WRAPPER ───────────────────────────────────────────────
function TweaksWrapper({ tweaks, setTweak }) {
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--accent', tweaks.accentColor);
    root.style.setProperty('--accent-dark', tweaks.accentColor);
    root.style.setProperty('--bg', tweaks.bgColor);
    root.style.setProperty('--title', tweaks.titleColor);
    root.style.setProperty('--radius', tweaks.roundness + 'px');
    root.style.setProperty('--display-font', `'${tweaks.displayFont}', serif`);
    // grain
    document.body.style.setProperty('--grain-opacity', tweaks.grainOpacity / 100);
    const style = document.getElementById('grain-style') || document.createElement('style');
    style.id = 'grain-style';
    style.textContent = `body::before { opacity: ${tweaks.grainOpacity / 100} !important; }`;
    document.head.appendChild(style);
  }, [tweaks]);

  const fontOptions = ['DM Serif Display', 'Cormorant Garamond', 'Playfair Display'];

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Visual del Hero">
        <TweakRadio label="Estilo de card" tweakKey="heroCardStyle" value={tweaks.heroCardStyle} onChange={v => setTweak('heroCardStyle', v)} options={['A','B','C','D']} />
      </TweakSection>
      <TweakSection label="Tipografía">
        <TweakSelect label="Fuente de títulos" tweakKey="displayFont" value={tweaks.displayFont} onChange={v => setTweak('displayFont', v)} options={fontOptions} />
      </TweakSection>
      <TweakSection label="Colores">
        <TweakColor label="Color acento" tweakKey="accentColor" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakColor label="Fondo principal" tweakKey="bgColor" value={tweaks.bgColor} onChange={v => setTweak('bgColor', v)} />
        <TweakColor label="Títulos" tweakKey="titleColor" value={tweaks.titleColor} onChange={v => setTweak('titleColor', v)} />
      </TweakSection>
      <TweakSection label="Textura y forma">
        <TweakSlider label="Radio de bordes" tweakKey="roundness" value={tweaks.roundness} onChange={v => setTweak('roundness', v)} min={0} max={28} step={2} />
        <TweakSlider label="Grano (textura)" tweakKey="grainOpacity" value={tweaks.grainOpacity} onChange={v => setTweak('grainOpacity', v)} min={0} max={8} step={0.5} />
      </TweakSection>
      <TweakSection label="Copys del hero">
        <TweakText label="Título principal" tweakKey="heroTitle" value={tweaks.heroTitle} onChange={v => setTweak('heroTitle', v)} />
        <TweakText label="Subtítulo" tweakKey="heroSubtitle" value={tweaks.heroSubtitle} onChange={v => setTweak('heroSubtitle', v)} />
      </TweakSection>
      <TweakSection label="Secciones visibles">
        <TweakToggle label="Mostrar testimonios" tweakKey="showTestimonials" value={tweaks.showTestimonials} onChange={v => setTweak('showTestimonials', v)} />
        <TweakToggle label="Mostrar cobertura nacional" tweakKey="showCoverage" value={tweaks.showCoverage} onChange={v => setTweak('showCoverage', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}
