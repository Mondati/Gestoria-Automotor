<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestoría del Automotor — Tupungato, Mendoza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f4e3;
      --accent: #cdb28a;
      --accent-dark: #b89567;
      --bg2: #d4ddb1;
      --bg2-dark: #c4d09e;
      --support: #b1ba8e;
      --title: #7a6448;
      --title-dark: #5c4a33;
      --text: #6b5d45;
      --text-light: #9a8870;
      --white: #fff;
      --card-bg: rgba(255,255,255,0.72);
      --shadow: 0 2px 20px rgba(122,100,72,0.07);
      --shadow-hover: 0 8px 32px rgba(122,100,72,0.13);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 5vw;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(249,244,227,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(205,178,138,0.18);
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(122,100,72,0.09); }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo-mark {
      width: 36px; height: 36px;
      background: var(--title);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-logo-mark svg { width: 20px; height: 20px; }
    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .nav-logo-text span:first-child {
      font-size: 13px;
      font-weight: 700;
      color: var(--title);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .nav-logo-text span:last-child {
      font-size: 10px;
      color: var(--text-light);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--title); }

    .nav-cta {
      background: var(--title);
      color: var(--white) !important;
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 12px !important;
      font-weight: 600 !important;
      transition: background 0.2s, transform 0.15s !important;
    }
    .nav-cta:hover {
      background: var(--title-dark) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-burger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--title);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 68px; left: 0; right: 0;
      background: rgba(249,244,227,0.97);
      backdrop-filter: blur(20px);
      z-index: 99;
      padding: 24px 5vw 32px;
      border-bottom: 1px solid rgba(205,178,138,0.2);
      flex-direction: column;
      gap: 8px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      padding: 10px 0;
      border-bottom: 1px solid rgba(205,178,138,0.15);
    }
    .mobile-menu a:last-child { border-bottom: none; }

    /* SECTIONS */
    section { width: 100%; }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 5vw;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 68px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .hero-bg-shape {
      position: absolute;
      top: -120px; right: -180px;
      width: 600px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(212,221,177,0.45) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-bg-shape2 {
      position: absolute;
      bottom: -100px; left: -200px;
      width: 500px; height: 400px;
      background: radial-gradient(ellipse at center, rgba(205,178,138,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
      padding: 80px 5vw;
      max-width: 1120px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(205,178,138,0.18);
      border: 1px solid rgba(205,178,138,0.35);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--title);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .hero-eyebrow-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 400;
      color: var(--title);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent-dark);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text);
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .hero-support {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .hero-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--title);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-primary:hover {
      background: var(--title-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(122,100,72,0.18);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      color: var(--title);
      padding: 9px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      border: 1.5px solid rgba(205,178,138,0.7);
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: rgba(205,178,138,0.1);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* HERO VISUAL */
    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-car-card {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, rgba(212,221,177,0.5) 0%, rgba(205,178,138,0.25) 100%);
      border-radius: 28px;
      border: 1px solid rgba(205,178,138,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-hover);
    }

    .hero-car-svg {
      width: 75%;
      opacity: 0.85;
    }

    .hero-badge {
      position: absolute;
      bottom: 24px; left: 24px;
      background: rgba(249,244,227,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(205,178,138,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-badge-icon {
      width: 36px; height: 36px;
      background: var(--bg2);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-badge-text { line-height: 1.3; }
    .hero-badge-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--title);
    }
    .hero-badge-text span {
      font-size: 11px;
      color: var(--text-light);
    }

    .hero-badge2 {
      position: absolute;
      top: 24px; right: 24px;
      background: var(--title);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .hero-badge2 strong {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.04em;
    }
    .hero-badge2 span {
      font-size: 10px;
      color: rgba(255,255,255,0.65);
    }

    /* SECTION HEADERS */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-dark);
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      color: var(--title);
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    .section-text {
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.75;
      max-width: 560px;
    }

    /* TRUST */
    .trust-section {
      background: var(--bg);
      padding: 100px 5vw;
    }
    .trust-inner {
      max-width: 1120px;
      margin: 0 auto;
    }
    .trust-header {
      text-align: center;
      margin-bottom: 64px;
    }
    .trust-header .section-text {
      margin: 20px auto 0;
    }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }

    .trust-card {
      background: var(--card-bg);
      border: 1px solid rgba(205,178,138,0.2);
      border-radius: var(--radius);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .trust-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .trust-icon {
      width: 48px; height: 48px;
      background: rgba(212,221,177,0.5);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .trust-icon svg { width: 24px; height: 24px; stroke: var(--title); }

    .trust-card h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--title);
      line-height: 1.3;
    }
    .trust-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .trust-banner {
      background: rgba(212,221,177,0.35);
      border: 1px solid rgba(177,186,142,0.35);
      border-radius: var(--radius);
      padding: 28px 36px;
      text-align: center;
    }
    .trust-banner p {
      font-size: 16px;
      color: var(--title);
      font-weight: 400;
      font-style: italic;
      line-height: 1.7;
    }

    /* SERVICES */
    .services-section {
      background: #f2edd9;
      padding: 100px 5vw;
    }
    .services-inner { max-width: 1120px; margin: 0 auto; }
    .services-header { margin-bottom: 56px; }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid rgba(205,178,138,0.2);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .service-num {
      width: 40px; height: 40px;
      background: rgba(205,178,138,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-dark);
      flex-shrink: 0;
    }

    .service-card h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--title);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .service-card p {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.55;
    }

    /* ADVISORY */
    .advisory-section {
      background: var(--title);
      padding: 100px 5vw;
      position: relative;
      overflow: hidden;
    }
    .advisory-bg {
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(ellipse, rgba(205,178,138,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .advisory-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      position: relative;
    }

    .advisory-inner .section-label { color: rgba(205,178,138,0.8); }
    .advisory-inner .section-title { color: var(--white); }
    .advisory-text {
      font-size: 17px;
      color: rgba(255,255,255,0.72);
      line-height: 1.75;
      margin-top: 20px;
    }

    .advisory-badge-free {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(205,178,138,0.3);
      border-radius: 12px;
      padding: 16px 24px;
    }
    .advisory-badge-free span {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
    }

    .advisory-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .advisory-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(205,178,138,0.2);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .advisory-card-icon {
      width: 48px; height: 48px;
      background: rgba(205,178,138,0.18);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .advisory-card-icon svg { width: 22px; height: 22px; stroke: var(--accent); }
    .advisory-card h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }
    .advisory-card p {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }

    /* COVERAGE */
    .coverage-section {
      background: var(--bg2);
      padding: 100px 5vw;
    }
    .coverage-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .coverage-inner .section-text { margin-top: 20px; }

    .coverage-map {
      background: rgba(249,244,227,0.6);
      border: 1px solid rgba(177,186,142,0.4);
      border-radius: 24px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    .coverage-map svg { width: 60%; opacity: 0.6; }
    .coverage-map p {
      font-size: 13px;
      font-weight: 600;
      color: var(--title);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .coverage-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 40px;
    }
    .coverage-stat {
      background: rgba(249,244,227,0.6);
      border: 1px solid rgba(177,186,142,0.3);
      border-radius: 12px;
      padding: 20px;
    }
    .coverage-stat strong {
      display: block;
      font-size: 24px;
      font-weight: 700;
      color: var(--title);
      line-height: 1;
      margin-bottom: 4px;
    }
    .coverage-stat span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* LOCATION */
    .location-section {
      background: var(--bg);
      padding: 100px 5vw;
    }
    .location-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .location-card {
      background: #f2edd9;
      border: 1px solid rgba(205,178,138,0.25);
      border-radius: 24px;
      padding: 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .location-icon {
      width: 56px; height: 56px;
      background: rgba(212,221,177,0.5);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .location-icon svg { width: 28px; height: 28px; stroke: var(--title); }
    .location-card address {
      font-style: normal;
      font-size: 22px;
      font-weight: 600;
      color: var(--title);
      line-height: 1.4;
    }
    .location-card span {
      font-size: 15px;
      color: var(--text-light);
    }

    .location-map-placeholder {
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(212,221,177,0.5), rgba(205,178,138,0.2));
      border: 1px solid rgba(205,178,138,0.3);
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      overflow: hidden;
      position: relative;
    }
    .location-map-placeholder svg { width: 48px; height: 48px; stroke: var(--title); opacity: 0.5; }
    .location-map-placeholder p {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 500;
    }

    /* CONTACT */
    .contact-section {
      background: #f2edd9;
      padding: 100px 5vw;
    }
    .contact-inner {
      max-width: 1120px;
      margin: 0 auto;
      text-align: center;
    }
    .contact-inner .section-title { margin-bottom: 16px; }
    .contact-inner .section-text { margin: 0 auto 48px; }

    .contact-phones {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .phone-card {
      background: var(--card-bg);
      border: 1px solid rgba(205,178,138,0.25);
      border-radius: var(--radius);
      padding: 24px 36px;
      text-align: left;
      box-shadow: var(--shadow);
      min-width: 220px;
    }
    .phone-card p {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .phone-card a {
      font-size: 22px;
      font-weight: 700;
      color: var(--title);
      text-decoration: none;
      display: block;
    }
    .phone-card a:hover { color: var(--accent-dark); }

    .contact-buttons {
      display: flex;
      justify-content: center;

  );
}

// ── TWEAKS ────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#cdb28a",
  "bgColor": "#f9f4e3",
  "titleColor": "#7a6448",
  "roundness": 16,
  "fontScale": 97
}/*EDITMODE-END*/;

function TweaksWrapper() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--accent', tweaks.accentColor);
    root.style.setProperty('--accent-dark', tweaks.accentColor);
    root.style.setProperty('--bg', tweaks.bgColor);
    root.style.setProperty('--title', tweaks.titleColor);
    root.style.setProperty('--radius', tweaks.roundness + 'px');
    document.body.style.fontSize = (tweaks.fontScale / 100) + 'rem';
  }, [tweaks]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Colores">
        <TweakColor label="Color acento" tweakKey="accentColor" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakColor label="Fondo principal" tweakKey="bgColor" value={tweaks.bgColor} onChange={v => setTweak('bgColor', v)} />
        <TweakColor label="Títulos y texto fuerte" tweakKey="titleColor" value={tweaks.titleColor} onChange={v => setTweak('titleColor', v)} />
      </TweakSection>
      <TweakSection label="Forma y escala">
        <TweakSlider label="Radio de bordes" tweakKey="roundness" value={tweaks.roundness} onChange={v => setTweak('roundness', v)} min={0} max={32} step={2} />
        <TweakSlider label="Escala tipográfica %" tweakKey="fontScale" value={tweaks.fontScale} onChange={v => setTweak('fontScale', v)} min={80} max={120} step={1} />
      </TweakSection>
    </TweaksPanel>
  );
}
