<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestoría del Automotor — Tupungato, Mendoza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #f4ecd5;
      --paper-2: #ede2c4;
      --ink: #1f1a14;
      --ink-2: #423529;
      --ink-3: #6b5d45;
      --rule: #c9b690;
      --accent: #b89567;
      --accent-deep: #8a6d44;
      --gold: #c9a564;
      --burgundy: #6b2e2a;
      --display: 'Fraunces', serif;
      --serif: 'Cormorant Garamond', serif;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background-color: var(--paper);
      color: var(--ink-2);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      font-feature-settings: 'liga', 'kern';
    }

    /* paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      opacity: 0.05;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px;
    }

    /* selection */
    ::selection { background: var(--ink); color: var(--paper); }

    /* ── FOLIO (page-number style fixed corner) ────────────────── */
    .folio {
      position: fixed;
      top: 50%;
      left: 24px;
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: left center;
      z-index: 90;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-2);
      mix-blend-mode: multiply;
      display: flex;
      align-items: center;
      gap: 16px;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .folio-num {
      font-weight: 500;
      color: var(--ink);
    }
    .folio-line {
      width: 28px;
      height: 1px;
      background: var(--ink-2);
      opacity: 0.4;
    }
    .folio-label {
      opacity: 0.7;
    }
    @media (max-width: 900px) { .folio { display: none; } }

    /* ── NAV ───────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      transition: padding 0.35s;
    }
    nav::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 78px;
      background: transparent;
      border-bottom: 1px solid transparent;
      transition: background 0.35s, border-color 0.35s, height 0.35s;
      z-index: -1;
    }
    nav.scrolled::before {
      background: rgba(244,236,213,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom-color: rgba(201,182,144,0.4);
      height: 66px;
    }
    nav.scrolled {
      padding: 12px 0;
    }
    nav > .nav-logo { display: none; }
    nav > .nav-links {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 6vw;
      box-sizing: border-box;
    }

    /* Mini institutional seal in nav */
    .nav-seal {
      width: 44px; height: 44px;
      border: 1.2px solid var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      transition: width 0.35s, height 0.35s;
    }
    .nav-seal::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 0.5px solid var(--ink-3);
      border-radius: 50%;
    }
    .nav-seal-text {
      font-family: var(--mono);
      font-size: 5.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
      color: var(--ink);
      font-weight: 500;
    }
    nav.scrolled .nav-seal { width: 38px; height: 38px; }
    nav.scrolled .nav-seal-text { font-size: 5px; }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      gap: 12px;
    }
    .nav-logo img {
      height: 42px;
      width: auto;
      object-fit: contain;
      transition: height 0.35s;
    }
    nav.scrolled .nav-logo img { height: 36px; }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      list-style: none;
    }
    .nav-links li { flex: 0 0 auto; }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--ink-2);
      text-decoration: none;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 400;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.2s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--ink);
      transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--ink); }
    .nav-links a:hover::after { width: 100%; }

    .nav-cta {
      font-family: var(--mono) !important;
      font-size: 11px !important;
      letter-spacing: 0.16em !important;
      background: var(--ink);
      color: var(--paper) !important;
      padding: 11px 20px !important;
      border-radius: 0 !important;
      transition: background 0.2s !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { background: var(--accent-deep); color: var(--paper) !important; }

    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
    }
    .nav-burger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--ink);
      transition: all 0.3s;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 70px; left: 0; right: 0;
      background: rgba(244,236,213,0.97);
      backdrop-filter: blur(18px);
      z-index: 99;
      padding: 32px 6vw 40px;
      flex-direction: column;
      gap: 4px;
      border-bottom: 1px solid var(--rule);
    }
    .mobile-menu.open { display: flex; }
    .menu-backdrop {
      position: fixed;
      inset: 0;
      top: 0;
      background: rgba(31,26,20,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: -1;
    }
    .mobile-menu a {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-2);
      text-decoration: none;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 14px 0;
      border-bottom: 1px solid rgba(201,182,144,0.3);
    }
    .mobile-menu a:last-child { border-bottom: none; color: var(--ink); font-weight: 600; padding-top: 22px; }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--ink);
      color: var(--paper);
      padding: 17px 30px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-deep);
      transform: translateY(100%);
      transition: transform 0.35s ease;
      z-index: 0;
    }
    .btn-primary:hover::before { transform: translateY(0); }
    .btn-primary > * { position: relative; z-index: 1; }
    .btn-primary svg { width: 16px; height: 16px; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      color: var(--ink);
      padding: 16px 30px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--ink);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-secondary:hover {
      background: var(--ink);
      color: var(--paper);
    }
    .btn-secondary svg { width: 14px; height: 14px; }

    /* ── EYEBROW & RULES ────────────────────────────────────── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .eyebrow-num {
      font-weight: 400;
      color: var(--accent-deep);
    }
    .eyebrow-rule {
      width: 32px;
      height: 1px;
      background: var(--ink-2);
      opacity: 0.5;
    }

    .section-rule {
      width: 100%;
      height: 1px;
      background: var(--rule);
      opacity: 0.55;
    }
    .section-rule-double {
      width: 100%;
      height: 4px;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    /* ── HERO ─────────────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      padding: 120px 0 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      background:
        radial-gradient(ellipse 1200px 600px at 80% 0%, rgba(184,149,103,0.08), transparent 60%),
        radial-gradient(ellipse 800px 500px at 0% 100%, rgba(107,46,42,0.04), transparent 60%),
        var(--paper);
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(31,26,20,0.025) 1px, transparent 1px);
      background-size: calc(100% / 12) 100%;
      pointer-events: none;
    }

    .hero-top-rule {
      position: absolute;
      top: 92px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 12vw);
      max-width: calc(1280px - 12vw);
      height: 1px;
      background: var(--rule);
      opacity: 0.4;
    }

    .hero-meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 80px;
      padding: 20px 6vw 0;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      position: relative;
      z-index: 2;
    }
    .hero-meta-bar > div { display: flex; gap: 14px; align-items: center; }
    .hero-meta-bar .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-deep); }
    .hero-meta-mono { color: var(--ink); font-weight: 500; }

    .hero-content {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
      padding: 0 6vw;
      position: relative;
      z-index: 2;
    }

    .hero-pretitle {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(20px, 2.4vw, 30px);
      color: var(--ink-2);
      font-weight: 400;
      margin-bottom: 14px;
    }

    .hero-title {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(56px, 9.5vw, 144px);
      line-height: 0.95;
      letter-spacing: -0.015em;
      color: var(--ink);
      margin-bottom: 0;
      font-variation-settings: "opsz" 144, "SOFT" 30;
      max-width: 100%;
      overflow-wrap: break-word;
    }
    .hero-mobile-location { display: none; }
    .hero-title em {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--accent-deep);
      font-size: 0.92em;
    }

    .hero-bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 60px;
      align-items: end;
      margin-top: 72px;
      padding-top: 36px;
      border-top: 1px solid var(--rule);
      position: relative;
      z-index: 2;
    }

    .hero-tagline {
      max-width: 460px;
    }
    .hero-tagline-eyebrow {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-deep);
      margin-bottom: 14px;
    }
    .hero-tagline-text {
      font-family: var(--serif);
      font-size: clamp(19px, 2.2vw, 26px);
      line-height: 1.45;
      color: var(--ink);
      font-weight: 400;
    }
    .hero-tagline-text em { font-style: italic; }

    .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }
    .hero-actions-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    /* INSTITUTIONAL SEAL (top-right plaque) */
    .hero-plaque {
      position: absolute;
      top: 130px;
      right: max(6vw, calc((100% - 1280px) / 2 + 6vw));
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      z-index: 2;
    }
    .hero-plaque-stamp {
      width: 78px; height: 78px;
      border: 1.5px solid var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 8px;
    }
    .hero-plaque-stamp::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid var(--ink);
      border-radius: 50%;
    }
    .hero-plaque-stamp-text {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      text-align: center;
      line-height: 1.3;
    }
    .hero-plaque-stamp-year {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      display: block;
      margin-top: 2px;
    }
    .hero-plaque-meta {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
      text-align: right;
      line-height: 1.6;
    }
    @media (max-width: 900px) { .hero-plaque { display: none; } }

    /* ── SECTIONS GENERAL ──────────────────────────────────────── */
    section { width: 100%; position: relative; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 6vw; width: 100%; }

    .section-head {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 60px;
      align-items: end;
      padding: 100px 0 64px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 64px;
    }
    .section-head-left .eyebrow { margin-bottom: 18px; }
    .section-head-left h2 {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(38px, 5.5vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .section-head-left h2 em {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      color: var(--accent-deep);
      font-size: 0.85em;
    }
    .section-head-right p {
      font-family: var(--serif);
      font-size: clamp(17px, 1.6vw, 21px);
      line-height: 1.55;
      color: var(--ink-2);
      max-width: 540px;
    }
    @media (max-width: 760px) {
      .section-head { grid-template-columns: 1fr; gap: 28px; padding: 72px 0 44px; margin-bottom: 44px; }
    }

    /* ── TRUST (Values strip) ─────────────────────────────────── */
    .trust { background: var(--paper); }
    .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--rule);
      border-left: 1px solid var(--rule);
      margin-bottom: 100px;
    }
    .trust-cell {
      padding: 36px 28px 44px;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.3s;
      position: relative;
    }
    .trust-cell:hover { background: rgba(184,149,103,0.05); }
    .trust-cell-num {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      color: var(--accent-deep);
      font-weight: 500;
    }
    .trust-cell h3 {
      font-family: var(--display);
      font-size: clamp(22px, 2.2vw, 28px);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-top: 8px;
    }
    .trust-cell p {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink-2);
      margin-top: 4px;
    }
    @media (max-width: 900px) { .trust-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px) { .trust-grid { grid-template-columns: 1fr; } }

    /* ── SERVICES (book index) ────────────────────────────────── */
    .services { background: var(--paper-2); padding-bottom: 120px; }

    .services-toc {
      display: flex;
      flex-direction: column;
    }
    .toc-item {
      display: grid;
      grid-template-columns: 80px 1fr auto 64px;
      align-items: baseline;
      gap: 32px;
      padding: 28px 8px 28px 16px;
      border-bottom: 1px solid var(--rule);
      cursor: default;
      transition: padding 0.3s, background 0.3s;
      position: relative;
      text-decoration: none !important;
      color: inherit;
    }
    .toc-item *, .toc-item:visited * { text-decoration: none !important; }
    .toc-item:first-child { border-top: 1px solid var(--rule); }
    .toc-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
      z-index: 0;
    }
    .toc-item:hover::before { transform: scaleX(1); }
    .toc-item:hover { padding-left: 32px; }
    .toc-item:hover > * { color: var(--paper) !important; position: relative; z-index: 1; }
    .toc-item:hover .toc-num { color: var(--accent) !important; }
    .toc-item:hover .toc-dots { opacity: 0.4; }

    .toc-num {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--accent-deep);
      letter-spacing: 0.14em;
      transition: color 0.3s;
      position: relative;
      z-index: 1;
    }
    .toc-title {
      font-family: var(--display);
      font-size: clamp(22px, 2.4vw, 32px);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.15;
      letter-spacing: -0.01em;
      transition: color 0.3s;
      position: relative;
      z-index: 1;
    }
    .toc-title em { font-family: var(--serif); font-style: italic; font-weight: 400; }
    .toc-desc {
      font-family: var(--serif);
      font-size: 15px;
      color: var(--ink-3);
      font-style: italic;
      line-height: 1.5;
      max-width: 320px;
      text-align: right;
      transition: color 0.3s;
      position: relative;
      z-index: 1;
    }
    .toc-arrow {
      font-family: var(--display);
      font-size: 28px;
      color: var(--ink-2);
      text-align: right;
      transition: color 0.3s, transform 0.4s ease;
      position: relative;
      z-index: 1;
      opacity: 0.45;
    }
    .toc-item:hover .toc-arrow {
      color: var(--paper) !important;
      opacity: 1;
      transform: translateX(8px);
    }

    @media (max-width: 760px) {
      .toc-item { grid-template-columns: 50px 1fr; gap: 16px; padding: 22px 8px; }
      .toc-desc, .toc-arrow { display: none; }

    /* ── PROCESS (timeline) ──────────────────────────────────── */
    .process { background: var(--ink); color: var(--paper); padding-bottom: 120px; position: relative; overflow: hidden; }
    .process::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 400px at 100% 0%, rgba(201,165,100,0.08), transparent 60%),
        radial-gradient(ellipse 600px 400px at 0% 100%, rgba(107,46,42,0.18), transparent 60%);
      pointer-events: none;
    }
    .process .section-head { border-bottom-color: rgba(244,236,213,0.18); }
    .process .section-head-left h2 { color: var(--paper); }
    .process .section-head-left h2 em { color: var(--gold); }
    .process .section-head-right p { color: rgba(244,236,213,0.78); }
    .process .eyebrow { color: rgba(244,236,213,0.6); }
    .process .eyebrow-rule { background: rgba(244,236,213,0.5); }
    .process .eyebrow-num { color: var(--gold); }

    .process-timeline {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      position: relative;
    }
    .process-step {
      padding: 0 28px 0 0;
      position: relative;
    }
    .process-step + .process-step { padding-left: 28px; border-left: 1px solid rgba(244,236,213,0.18); }

    .process-num {
      font-family: var(--display);
      font-size: clamp(72px, 8vw, 110px);
      font-weight: 400;
      line-height: 0.9;
      color: var(--gold);
      margin-bottom: 24px;
      letter-spacing: -0.04em;
    }
    .process-num em { font-family: var(--serif); font-style: italic; font-weight: 400; }
    .process-step h3 {
      font-family: var(--display);
      font-size: clamp(20px, 1.8vw, 24px);
      font-weight: 400;
      color: var(--paper);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .process-step p {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.55;
      color: rgba(244,236,213,0.7);
    }
    @media (max-width: 900px) {
      .process-timeline { grid-template-columns: repeat(2, 1fr); gap: 32px 0; }
      .process-step:nth-child(odd) { padding-left: 0 !important; border-left: none !important; }
    }
    @media (max-width: 540px) {
      .process-timeline { grid-template-columns: 1fr; gap: 36px; }
      .process-step { padding: 0 !important; border-left: none !important; }
    }

    /* ── ADVISORY (editorial spread) ────────────────────────── */
    .advisory { background: var(--paper); padding-bottom: 120px; }
    .advisory-spread {
      display: grid;
      grid-template-columns: 5fr 7fr;
      gap: 80px;
      align-items: start;
    }
    .advisory-quote {
      position: sticky;

    .advisory-quote-mark {
      font-family: var(--display);

    .advisory-quote-text {
      font-family: var(--display);
      font-size: clamp(26px, 2.8vw, 38px);
      line-height: 1.2;
      color: var(--ink);
      font-weight: 400;
      letter-spacing: -0.01em;

    .advisory-quote-text em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent-deep); }

    .advisory-quote-rule {

    .advisory-quote-attr {

    .advisory-list {

      flex-direction: column;

    .advisory-item {
      display: grid;

      gap: 28px;
      padding: 32px 0;
      border-bottom: 1px solid var(--rule);
    }
    .advisory-item:first-child { padding-top: 0; }
    .advisory-item:last-child { border-bottom: none; }

    .advisory-item-num {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: var(--accent-deep);

    .advisory-item h3 {
      font-family: var(--display);

      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 10px;

    .advisory-item p {
      font-family: var(--serif);

      line-height: 1.55;
      color: var(--ink-2);
    }

    @media (max-width: 900px) {
      .advisory-spread { grid-template-columns: 1fr; gap: 48px; }
      .advisory-quote { position: static; }
    }

    /* ── COVERAGE (statement) ────────────────────────────────── */
    .coverage {
      background: var(--paper-2);
      padding: 140px 0;
      text-align: center;
    }
    .coverage-eyebrow { display: inline-flex; margin-bottom: 32px; }
    .coverage h2 {
      font-family: var(--display);
      font-size: clamp(48px, 7vw, 110px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--ink);
      max-width: 1100px;
      margin: 0 auto;
    }
    .coverage h2 em {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      color: var(--accent-deep);
    }
    .coverage-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      margin-top: 80px;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .coverage-stat {
      padding: 36px 16px;
      border-right: 1px solid var(--rule);
    }
    .coverage-stat:last-child { border-right: none; }
    .coverage-stat strong {
      display: block;
      font-family: var(--display);
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 400;
      color: var(--ink);

      letter-spacing: -0.02em;
      margin-bottom: 10px;

    .coverage-stat strong em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent-deep); }
    .coverage-stat span {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    @media (max-width: 760px) {
      .coverage-stats { grid-template-columns: repeat(2, 1fr); }
      .coverage-stat:nth-child(2) { border-right: none; }
      .coverage-stat:nth-child(1), .coverage-stat:nth-child(2) { border-bottom: 1px solid var(--rule); }
    }

    /* ── LOCATION ─────────────────────────────────────────────── */
    .location { background: var(--paper); padding: 120px 0; }
    .location-spread {
      display: grid;
      grid-template-columns: 5fr 7fr;
      gap: 80px;
      align-items: center;
    }
    .location-eyebrow { margin-bottom: 24px; }
    .location h2 {
      font-family: var(--display);
      font-size: clamp(40px, 5vw, 68px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 0.98;
      color: var(--ink);
      margin-bottom: 32px;
    }
    .location h2 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent-deep); }

    .location-address {
      font-family: var(--serif);
      font-size: clamp(24px, 2.4vw, 32px);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 24px;
    }
    .location-meta {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 36px;
      line-height: 1.8;
    }
    .location-meta-item { display: flex; gap: 12px; align-items: center; }
    .location-meta-item span:first-child { color: var(--accent-deep); width: 90px; }

    .location-map {
      aspect-ratio: 4/3;
      background:
        repeating-linear-gradient(45deg, transparent 0 22px, rgba(184,149,103,0.07) 22px 23px),
        linear-gradient(135deg, var(--paper-2), rgba(184,149,103,0.18));
      border: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
      transition: filter 0.3s;
    }
    .location-map:hover { filter: brightness(0.96); }
    .location-map::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(184,149,103,0.4);
    }
    .location-pin {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .location-pin-dot {
      width: 14px; height: 14px;
      background: var(--burgundy);
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(107,46,42,0.18), 0 0 0 16px rgba(107,46,42,0.08);
      animation: pulse 2.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(107,46,42,0.18), 0 0 0 16px rgba(107,46,42,0.08); }
      50% { box-shadow: 0 0 0 10px rgba(107,46,42,0.22), 0 0 0 24px rgba(107,46,42,0.04); }
    }
    .location-pin-label {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
      padding: 4px 10px;
      border: 1px solid var(--ink);
      white-space: nowrap;
    }
    .location-map-label {
      position: absolute;
      bottom: 24px; left: 24px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .location-map-coord {
      position: absolute;
      top: 24px; right: 24px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--ink-2);
      text-align: right;
      line-height: 1.6;
    }
    @media (max-width: 900px) { .location-spread { grid-template-columns: 1fr; gap: 48px; } }

    /* ── CONTACT ───────────────────────────────────────────── */
    .contact { background: var(--paper-2); padding: 120px 0; }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .contact-card {
      padding: 56px 48px;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-decoration: none;
      transition: background 0.3s;
      position: relative;
    }
    .contact-card:last-child { border-right: none; }
    .contact-card:hover { background: var(--ink); }
    .contact-card:hover * { color: var(--paper) !important; }
    .contact-card:hover .contact-card-arrow { transform: translateX(6px); color: var(--gold) !important; }

    .contact-card-eyebrow {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-deep);
      transition: color 0.3s;
    }
    .contact-card-num {
      font-family: var(--display);
      font-size: clamp(34px, 4vw, 48px);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      transition: color 0.3s;
    }
    .contact-card-action {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .contact-card-action span {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
      transition: color 0.3s;
    }
    .contact-card-arrow {
      font-family: var(--display);
      font-size: 22px;
      color: var(--ink);
      transition: transform 0.3s, color 0.3s;
    }
    @media (max-width: 760px) {
      .contact-grid { grid-template-columns: 1fr; }
      .contact-card { border-right: none; border-bottom: 1px solid var(--rule); }
      .contact-card:last-child { border-bottom: none; }
    }

    /* ── CLOSING ──────────────────────────────────────────── */
    .closing {
      background: var(--paper);
      padding: 160px 0 80px;
      position: relative;
      text-align: center;

    .closing-watermark {
      position: absolute;

    .closing-content {

    .closing-eyebrow { display: inline-flex; margin-bottom: 32px; }
    .closing h2 {

    .closing-phones {

    .footer-inner {

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .word-reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

// ── WORD REVEAL helper (split a string into per-word reveals) ──
function SplitReveal({ children, className = "" }) {
  // Recursively extract plain text from any children (string, number, array, or React element)
  const extractText = (node) => {
    if (node == null || typeof node === 'boolean') return '';
    if (typeof node === 'string' || typeof node === 'number') return String(node);
    if (Array.isArray(node)) return node.map(extractText).join('');
    if (React.isValidElement(node)) return extractText(node.props.children);
    return '';
  };
  const text = extractText(children);
  const words = text.split(' ').filter(Boolean);
  return (
    <span className={`word-reveal-stagger ${className}`}>
      {words.map((w, i) => (
        <React.Fragment key={i}>
          <span className="word-reveal"><span>{w}</span></span>
          {i < words.length - 1 ? ' ' : ''}
        </React.Fragment>
      ))}
    </span>
  );
}

// ── TWEAKS ───────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#b89567",
  "paperColor": "#f4ecd5",
  "inkColor": "#1f1a14",
  "displayFont": "Fraunces"
}/*EDITMODE-END*/;

function TweaksWrapper() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--accent-deep', tweaks.accentColor);
    r.setProperty('--accent', tweaks.accentColor);
    r.setProperty('--paper', tweaks.paperColor);
    r.setProperty('--ink', tweaks.inkColor);
    r.setProperty('--display', `'${tweaks.displayFont}', serif`);
  }, [tweaks]);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Paleta">
        <TweakColor label="Tinta principal" tweakKey="inkColor" value={tweaks.inkColor} onChange={v => setTweak('inkColor', v)} />
        <TweakColor label="Papel (fondo)" tweakKey="paperColor" value={tweaks.paperColor} onChange={v => setTweak('paperColor', v)} />
        <TweakColor label="Acento" tweakKey="accentColor" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
      </TweakSection>
      <TweakSection label="Tipografía">
        <TweakRadio label="Display" tweakKey="displayFont" value={tweaks.displayFont}
          onChange={v => setTweak('displayFont', v)}
          options={['Fraunces','Cormorant Garamond']} />
      </TweakSection>
    </TweaksPanel>
  );
}
